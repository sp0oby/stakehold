    <text x="46" y="31" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="17" fill="#e7ecf9">Live on Sepolia</text>

    <rect x="230" y="0" width="220" height="48" rx="24" fill="#1c2848" stroke="#2a3966" stroke-width="1"/>
    <text x="250" y="31" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="17" fill="#e7ecf9">UUPS Upgradeable</text>

    <rect x="470" y="0" width="260" height="48" rx="24" fill="#1c2848" stroke="#2a3966" stroke-width="1"/>
    <text x="490" y="31" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="17" fill="#e7ecf9">Foundry · Next.js · viem</text>
